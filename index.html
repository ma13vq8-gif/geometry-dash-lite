<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometry Dash Lite</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <div id="ui">
            <div class="stats-bar">
                <div class="stat"><span>⭐</span> <span id="starCount">0</span></div>
                <div class="stat"><span>💎</span> <span id="diamondCount">0</span></div>
                <div class="stat"><span>🪙</span> <span id="coinCount">0</span></div>
                <div class="stat" id="songInfo">🎵 Stereo Madness</div>
                <div class="stat"><span>🔐</span> <button id="authBtn" class="auth-button">LOGIN</button></div>
            </div>
            
            <div id="levelSelect">
                <h3>SELECT LEVEL</h3>
                <div class="level-grid" id="levelGrid"></div>
            </div>
            
            <div class="game-ui">
                <div id="percentage">0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <div class="counters">
                <div class="counter">Attempts: <span id="attemptNum">0</span></div>
                <div class="counter">Deaths: <span id="deathNum">0</span></div>
            </div>
        </div>
        
        <div id="menuOverlay" class="overlay">
            <div class="overlay-content">
                <h1>⚡ GEOMETRY DASH LITE ⚡</h1>
                <button id="playBtn">▶ START GAME</button>
                <button id="practiceBtn">🔄 PRACTICE MODE</button>
                <button id="statsBtn">📊 STATISTICS</button>
                <button id="resetBtn">🗑️ RESET PROGRESS</button>
            </div>
        </div>
        
        <div id="completeOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h1>🎉 LEVEL COMPLETE! 🎉</h1>
                <p id="rewardText"></p>
                <button id="continueBtn">CONTINUE</button>
            </div>
        </div>
        
        <div id="statsOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h1>📊 STATISTICS</h1>
                <div id="statsContent"></div>
                <button id="closeStatsBtn" class="close-btn">CLOSE</button>
            </div>
        </div>
        
        <div id="authModal" class="overlay hidden">
            <div class="overlay-content">
                <h2>🔐 ACCOUNT</h2>
                <div class="auth-tabs">
                    <button id="loginTabBtn" class="auth-tab active">LOGIN</button>
                    <button id="registerTabBtn" class="auth-tab">REGISTER</button>
                </div>
                
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
                    <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
                    <button id="doLoginBtn" class="auth-submit">LOGIN</button>
                </div>
                
                <div id="registerForm" class="hidden">
                    <input type="text" id="regUsername" placeholder="Username" class="auth-input">
                    <input type="email" id="regEmail" placeholder="Email" class="auth-input">
                    <input type="password" id="regPassword" placeholder="Password" class="auth-input">
                    <button id="doRegisterBtn" class="auth-submit">REGISTER</button>
                </div>
                
                <button id="closeAuthBtn" class="close-btn">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="levels.js"></script>
    <script src="audio.js"></script>
    <script src="utils.js"></script>
    <script src="auth.js"></script>
    <script src="game.js"></script>
</body>
</html>
