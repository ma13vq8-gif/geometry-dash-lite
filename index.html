<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometry Dash Lite</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        
        <div id="ui">
            <div class="stats-bar">
                <div class="stat"><span>⭐</span> <span id="starCount">0</span></div>
                <div class="stat"><span>💎</span> <span id="diamondCount">0</span></div>
                <div class="stat"><span>🪙</span> <span id="coinCount">0</span></div>
                <div class="stat" id="songInfo">🎵 Stereo Madness</div>
            </div>
            
            <div id="levelSelect">
                <h3>SELECT LEVEL</h3>
                <div class="level-grid" id="levelGrid"></div>
            </div>
            
            <div class="game-ui">
                <div id="percentage">0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <div class="attempts-counter">Attempts: <span id="attemptNum">0</span></div>
            <div class="deaths-counter">Deaths: <span id="deathNum">0</span></div>
        </div>
        
        <div id="menuOverlay" class="overlay">
            <div class="overlay-content">
                <h1>⚡ GEOMETRY DASH LITE ⚡</h1>
                <button id="playBtn">▶ START GAME</button>
                <button id="practiceBtn">🔄 PRACTICE MODE</button>
                <button id="statsBtn">📊 STATISTICS</button>
                <button id="resetBtn">🗑️ RESET PROGRESS</button>
            </div>
        </div>
        
        <div id="completeOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h1>🎉 LEVEL COMPLETE! 🎉</h1>
                <p id="rewardText"></p>
                <button id="continueBtn">CONTINUE</button>
            </div>
        </div>
        
        <div id="statsOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h1>📊 PLAYER STATISTICS</h1>
                <div id="statsContent"></div>
                <button id="closeStatsBtn">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="levels.js"></script>
    <script src="audio.js"></script>
    <script src="utils.js"></script>
    <script src="game.js"></script>
</body>
</html>
