<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geometry Dash Lite</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="500"></canvas>
        
        <div id="topBar">
            <div class="stat">⭐ <span id="stars">0</span></div>
            <div class="stat">💎 <span id="diamonds">0</span></div>
            <div class="stat">🪙 <span id="coins">0</span></div>
            <div class="stat">🎵 <span id="levelName">Stereo Madness</span></div>
            <button id="authBtn">LOGIN</button>
        </div>
        
        <div id="levelSelect">
            <button class="level-btn" data-level="1">1. Stereo Madness ⭐3</button>
            <button class="level-btn" data-level="2">2. Back On Track ⭐3</button>
            <button class="level-btn" data-level="3">3. Polargeist ⭐4</button>
            <button class="level-btn" data-level="4">4. Dry Out ⭐4</button>
            <button class="level-btn" data-level="5">5. Electrodynamix ⭐5</button>
        </div>
        
        <div id="percentage">0%</div>
        
        <div id="menuOverlay" class="overlay">
            <div class="overlay-content">
                <h1>⚡ GEOMETRY DASH ⚡</h1>
                <button id="playBtn">PLAY</button>
                <button id="practiceBtn">PRACTICE</button>
                <button id="statsBtn">STATS</button>
                <button id="resetBtn">RESET</button>
            </div>
        </div>
        
        <div id="gameOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h1>💀 GAME OVER 💀</h1>
                <button id="retryBtn">RETRY</button>
                <button id="menuBtn">MENU</button>
            </div>
        </div>
        
        <div id="winOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h1>🎉 COMPLETE! 🎉</h1>
                <p id="rewardText"></p>
                <button id="nextBtn">CONTINUE</button>
            </div>
        </div>
        
        <div id="statsOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>STATISTICS</h2>
                <div id="statsContent"></div>
                <button id="closeStatsBtn">CLOSE</button>
            </div>
        </div>
        
        <div id="authOverlay" class="overlay hidden">
            <div class="overlay-content">
                <h2>ACCOUNT</h2>
                <input type="email" id="authEmail" placeholder="Email">
                <input type="password" id="authPassword" placeholder="Password">
                <input type="text" id="authUsername" placeholder="Username (register only)">
                <button id="doLogin">LOGIN</button>
                <button id="doRegister">REGISTER</button>
                <button id="closeAuthBtn">CANCEL</button>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="game.js"></script>
</body>
</html>
